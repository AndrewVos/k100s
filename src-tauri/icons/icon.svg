<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="k100s app icon">
  <defs>
    <linearGradient id="case" x1="128" y1="104" x2="896" y2="920" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <radialGradient id="screen-glow" cx="50%" cy="50%" r="62%">
      <stop offset="0" stop-color="#16a34a" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#16a34a" stop-opacity="0"/>
    </radialGradient>
    <filter id="text-glow" x="-10%" y="-35%" width="120%" height="170%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="96" y="96" width="832" height="832" rx="192" fill="url(#case)"/>
  <rect x="96" y="96" width="832" height="832" rx="192" fill="url(#screen-glow)"/>

  <g font-family="'Courier New', 'Menlo', 'Monaco', monospace" font-weight="800" filter="url(#text-glow)">
    <text x="512" y="522" text-anchor="middle" dominant-baseline="middle" font-size="172" letter-spacing="-8" fill="#86efac">k100s</text>
  </g>
</svg>
